{% extends "base.html" %}

{% block content %}

<h2 style="text-align:center;">Our Products</h2>

<div class="products">

{% for p in products %}

<div class="card">

<img src="{{ url_for('static', filename='images/' + p[4]) }}">



<h3>{{ p[1] }}</h3>

<p>{{ p[3] }}</p>


<div class="price">
₹{{ p[2] }}
</div>

<a href="{{ url_for('add_to_cart', id=p[0]) }}">
<button>Add to Cart</button>
</a>

</div>

{% endfor %}

</div>

{% endblock %}
