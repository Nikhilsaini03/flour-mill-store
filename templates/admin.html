<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f3f3f3;
            margin: 0;
        }

        .navbar {
            background-color: #131921;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        input {
            padding: 10px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background-color: #febd69;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background-color: #f3a847;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #232f3e;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            text-align: center;
            background: white;
            border-bottom: 1px solid #ddd;
        }

        .delete-btn {
            background-color: red;
            color: white;
        }

        .delete-btn:hover {
            background-color: darkred;
        }

        img {
            width: 60px;
            height: 60px;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="navbar">
    🛒 Admin Dashboard
</div>

<div class="container">

    <!-- Add Product -->
    <div class="card">
        <h2>Add Product</h2>

        <form action="/add_product" method="POST">
            <input type="text" name="name" placeholder="Product Name" required>
            <input type="number" name="price" placeholder="Price" required>
            <input type="text" name="description" placeholder="Description" required>
            <input type="text" name="image" placeholder="Image file name (e.g. wheat.jpg)" required>
            <button type="submit">Add</button>
        </form>
    </div>

    <!-- Product List -->
    <div class="card">
        <h2>Products</h2>

        <table>
            <tr>
                <th>ID</th>
                <th>Image</th>
                <th>Name</th>
                <th>Price</th>
                <th>Action</th>
            </tr>

            {% for p in products %}
            <tr>
                <td>{{ p[0] }}</td>

                <td>
                    <img src="{{ url_for('static', filename='images/' + p[4]) }}">
                </td>

                <td>{{ p[1] }}</td>
                <td>₹{{ p[2] }}</td>

                <td>
                    <a href="/delete_product/{{ p[0] }}">
                        <button class="delete-btn">Delete</button>
                    </a>
                </td>
            </tr>
            {% endfor %}

        </table>
    </div>

</div>

</body>
</html>
