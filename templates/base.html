<!DOCTYPE html>
<html>
<head>

<title>Flour Mill Store</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

.navbar{
background:#131921;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
width:230px;
margin:15px;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.card{
    transition: all 0.3s ease;
}
.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.card img{
width:180px;
height:180px;
object-fit:cover;
}



.price{
color:green;
font-size:18px;
margin:10px 0;
}

button{
background:#ff9900;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<div>
<b>Flour Mill Store</b>
</div>

<div>
<a href="/">Home</a>
<a href="/cart">Cart</a>
</div>

</div>

{% block content %}

{% endblock %}

</body>
</html>
