<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.checkmark {
    font-size: 60px;
    color: green;
}

.btn {
    margin-top: 15px;
    padding: 12px 25px;
    text-decoration: none;
    border-radius: 6px;
    display: block;
}

.whatsapp {
    background: #25D366;
    color: white;
}

.shop {
    background: black;
    color: white;
}
</style>

</head>
<body>

<div class="container">
    <div class="checkmark">✅</div>
    <h2>Order Placed Successfully</h2>

    <p>Your Order ID: <b>#{{ order_id }}</b></p>

    <p>Click below to send order on WhatsApp</p>

    <!-- WhatsApp Button -->
    <a href="{{ whatsapp_url }}" class="btn whatsapp">Send on WhatsApp</a>

    <!-- Continue Shopping -->
    <a href="/products" class="btn shop">Continue Shopping</a>
</div>

</body>
</html>
