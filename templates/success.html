<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Successful</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 12px;
    text-align: center;
    width: 350px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

.checkmark {
    font-size: 60px;
    color: green;
}

.btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: black;
    color: white;
    text-decoration: none;
    border-radius: 6px;
    display: inline-block;
}

#countdown {
    color: gray;
    font-size: 14px;
    margin-top: 10px;
}
</style>

</head>
<body>

<div class="container">
    <div class="checkmark">✅</div>
    <h2>Order Placed Successfully</h2>

    <p>Your Order ID: <b>#{{ order_id }}</b></p>

    <p>Thank you for shopping with us!</p>

    <a href="/products" class="btn">Continue Shopping</a>

    <p id="countdown">Redirecting in 5 seconds...</p>
</div>

<!-- 🎉 Confetti -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
// Confetti burst
confetti({
    particleCount: 150,
    spread: 70,
    origin: { y: 0.6 }
});

// Auto redirect
let time = 5;
setInterval(() => {
    time--;
    document.getElementById("countdown").innerText = "Redirecting in " + time + " seconds...";
    if(time === 0){
        window.location.href = "/products";
    }
}, 1000);
</script>

</body>
</html>
